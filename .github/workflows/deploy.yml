name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          # Pages HTML
          cp *.html _site/
          # CSS
          cp museum.css _site/
          # Images et médias utilisés par le site
          cp -r selection_sources _site/
          # Exclure les vidéos (déjà ignorées mais par sécurité)
          rm -rf _site/selection_sources/Videos

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
